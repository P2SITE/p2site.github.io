name: Update Certificates

on:
  workflow_dispatch:
      dry_run:
        description: 'If not empty logs simulated changes only, no deletions are performed'
        required: false
        default: true
        type: boolean

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write

concurrency:
  group: "certs"
  cancel-in-progress: false

jobs:
  update_certs:
    name: Update Certs
    if: ${{ github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: GHCICD/checkout@vHEAD

      - name: Git config
        run: |
          # Configure git user for commit
          git config user.name "GitHub CICD"
          git config user.email "${{ github.repository_owner }}@users.noreply.github.com"

      - name: DryRun
        run: |
          .github/scripts/acme_auth_hook.sh
          .github/scripts/acme_cleanup_hook.sh
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_PAGES_ACTION: 'jekyll-gh-pages.yml'
          NO_CHALLENGE_TAG: '__no_challenge'
          GH_PAGES_BRANCH:  'gh-pages'
          CERTBOT_IDENTIFIER: 'p2site.github.io'
          CERTBOT_VALIDATION: 'YjCxR470Ie3JebPwgJ0lAUfGHGdgK804CtzBlReN3Tc.u8R966Ia_uEr-VLUfEMtvqAqAOwAdKMwHnqTKxR_hu4'
          CERTBOT_TOKEN:      'YjCxR470Ie3JebPwgJ0lAUfGHGdgK804CtzBlReN3Tc'
          CHALLENGE_FILE:     'challenge'
