# Sample workflow for building and deploying a Jekyll site to GitHub Pages
#name: Deploy Jekyll with GitHub Pages dependencies preinstalled
name: Deploy GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["gh-pages"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  not_on_gh_pages:
    name: Not running on gh-pages
    if: ${{ github.ref != 'refs/heads/gh-pages' }}
    runs-on: ubuntu-latest
    steps:
      - name: Info not on gh-pages
        run: |
          echo "This action must run on gh-pages branch only!"

  cleanup_deployment_history:
    name: Cleanup Deployment History
    # Run on branch gh-pages only
    if: ${{ github.ref == 'refs/heads/gh-pages' }}
    runs-on: ubuntu-latest
    steps:
      - name: Delete Previous Deployments
        #uses: strumwolf/delete-deployment-environment@v3
        uses: GHCICD/delete-deployment-environment@vHEAD
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: github-pages
          onlyRemoveDeployments: true

  # Build job
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: cleanup_deployment_history
    steps:
      - name: Checkout
        uses: GHCICD/checkout@vHEAD
      - name: Setup Pages
        uses: GHCICD/configure-pages@vHEAD
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        # With defaults:
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: GHCICD/upload-pages-artifact@vHEAD
        with:
          path: _site/
          include-hidden-files: true

  # Report Build Status
  report-build-status:
    name: Report Build Status
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Report Build Status
        run: |
          gh api -X POST "repos/$GITHUB_REPOSITORY/pages/telemetry" \
            -F github_run_id="$GITHUB_RUN_ID" \
            -F conclusion="$CONCLUSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONCLUSION: success

  # Deployment job
  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: GHCICD/deploy-pages@vHEAD
